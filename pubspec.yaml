name: shadow_inventory_pro
description: Shadow Inventory Pro v2
publish_to: none
version: 2.0.6+6
environment:
  sdk: ">=3.4.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  provider: 6.1.2
  sqflite: 2.3.3+1
  path: 1.9.1
  path_provider: 2.1.6
  uuid: 4.5.1
  equatable: 2.0.5
  intl: 0.19.0
  fl_chart: 0.66.0
  image_picker: 1.1.2
  pdf: 3.10.8
  printing: 5.14.3
  excel: ^4.0.6
  share_plus: ^12.0.2
  skeletonizer: ^2.1.3
  file_picker: ^8.1.6
  mobile_scanner:
    path: plugins/mobile_scanner
  permission_handler: ^11.3.1
  http: ^1.2.0
  cached_network_image: ^3.3.0
  supabase_flutter: ^2.8.1
  flutter_dotenv: ^5.2.1
  qr_flutter: ^4.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/app_logo.png
  adaptive_icon_background: "#1a1a2e"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
